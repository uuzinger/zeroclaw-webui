<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZeroClaw</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav>
    <div class="nav-inner">
      <span class="nav-logo">🦀 ZeroClaw</span>
      <div class="nav-tabs">
        <button class="nav-tab" data-tab="files">📁 Files</button>
        <button class="nav-tab active" data-tab="chat">💬 Chat <span class="unread-badge" id="unreadBadge" hidden>0</span></button>
      </div>
      <a href="/logout" class="nav-logout">Sign out</a>
    </div>
  </nav>

  <!-- Files Tab -->
  <main id="tabFiles" hidden>
    <section class="upload-zone" id="dropzone">
      <div class="upload-inner">
        <div class="upload-icon">📁</div>
        <p class="upload-title">Drop files here or <label for="fileInput" class="browse-link">browse</label></p>
        <p class="upload-sub">Max 50MB per file</p>
        <input type="file" id="fileInput" multiple hidden>
      </div>
      <div class="upload-progress" id="uploadProgress" hidden>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <p id="progressText">Uploading...</p>
      </div>
    </section>

    <div class="panels">
      <section class="panel">
        <h2>📤 Downloads from ZeroClaw</h2>
        <p class="panel-sub">Files ZeroClaw has generated for you</p>
        <div class="file-list" id="downloadsList">
          <div class="empty">No files yet</div>
        </div>
      </section>

      <section class="panel">
        <h2>📥 Your Uploads</h2>
        <p class="panel-sub">Files you've sent to ZeroClaw</p>
        <div class="file-list" id="uploadsList">
          <div class="empty">No files yet</div>
        </div>
      </section>
    </div>
  </main>

  <!-- Chat Tab -->
  <main id="tabChat">
    <div class="chat-layout">

      <!-- Sidebar: conversation list -->
      <aside class="chat-sidebar" id="chatSidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Conversations</span>
          <button class="btn-icon" id="newConvoBtn" title="New conversation">＋</button>
        </div>
        <div class="convo-list" id="convoList">
          <!-- populated by JS -->
        </div>
      </aside>

      <!-- Main chat area -->
      <div class="chat-main">
        <div class="chat-topbar">
          <button class="btn-icon sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">☰</button>
          <span class="chat-convo-title" id="chatConvoTitle">Chat</span>
          <button class="btn-icon" id="renameConvoBtn" title="Rename conversation">✏️</button>
          <button class="btn-icon btn-danger" id="deleteConvoBtn" title="Delete conversation">🗑</button>
        </div>

        <div class="chat-messages" id="chatMessages">
          <div class="chat-empty">No messages yet. Say hello! 👋</div>
        </div>

        <div class="chat-input-row">
          <textarea
            id="chatInput"
            class="chat-input"
            placeholder="Message ZeroClaw..."
            rows="1"
            maxlength="2000"
          ></textarea>
          <button id="chatSend" class="btn btn-send">Send</button>
        </div>
      </div>

    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
